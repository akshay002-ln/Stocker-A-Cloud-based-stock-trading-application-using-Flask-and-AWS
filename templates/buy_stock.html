{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<div class="row mb-4">

<div class="col">
<h2 class="fw-bold">Buy Stock</h2>
<p class="text-muted">{{ stock.name }} ({{ stock.symbol }})</p>
</div>

</div>


<div class="row">

<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="mb-3">Stock Details</h5>

<p><strong>Symbol:</strong> {{ stock.symbol }}</p>
<p><strong>Company:</strong> {{ stock.name }}</p>
<p><strong>Sector:</strong> {{ stock.sector }}</p>

<h4 class="text-success">
Current Price: ₹{{ stock.price }}
</h4>

</div>

</div>

</div>


<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="mb-3">Place Buy Order</h5>

<form method="POST">

<div class="mb-3">

<label class="form-label">Quantity</label>

<input
type="number"
class="form-control"
id="quantity"
name="quantity"
min="1"
required>

</div>

<div class="mb-3">

<label class="form-label">Estimated Total</label>

<div class="input-group">

<span class="input-group-text">₹</span>

<input
type="text"
class="form-control"
id="total"
readonly>

</div>

</div>

<div class="d-grid gap-2">

<button type="submit" class="btn btn-success">
<i class="bi bi-cart-plus"></i> Confirm Purchase
</button>

<a href="{{ url_for('service04') }}" class="btn btn-secondary">
Cancel
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>


<script>

document.getElementById('quantity').addEventListener('input', function(){

const quantity = parseInt(this.value) || 0
const price = parseFloat("{{ stock.price }}")

const total = (quantity * price).toFixed(2)

document.getElementById('total').value = total

})

</script>

{% endblock %}
